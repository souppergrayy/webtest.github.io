<!DOCTYPE html>
<html>
<head>
  <title>Test Tracking GTM</title>

  <!-- ① Restore hashed user_id จาก localStorage ก่อน GTM โหลด -->
  <script>
    window.dataLayer = window.dataLayer || [];
    var savedUserId = localStorage.getItem('user_id_hash');
    if (savedUserId) {
      dataLayer.push({ hashed_user_id: savedUserId });
    }
  </script>

  <!-- ② Google Tag Manager -->
  <script>
    (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;
    f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-MFT7KX5M');
  </script>
  <!-- End GTM -->

  <!-- ③ Tracking Functions -->
  <script>

    // แปลงอีเมลเป็น SHA-256 hash ก่อนส่ง GA4
    async function hashEmail(email) {
      var normalized = email.trim().toLowerCase();
      var encoded = new TextEncoder().encode(normalized);
      var hashBuffer = await crypto.subtle.digest('SHA-256', encoded);
      var hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // ดึง hashed user_id จาก localStorage
    function getUserId() {
      return localStorage.getItem('user_id_hash');
    }

    // LOGIN EVENT
    async function login() {
      var email = document.getElementById('username').value;
      if (!email) { alert('Please enter email'); return; }

      var hashed = await hashEmail(email);
      localStorage.setItem('user_id_hash', hashed);

      dataLayer.push({
        event: 'login',
        hashed_user_id: hashed
      });

      alert('Login success: ' + email);
    }

    // BUTTON CLICK EVENT
    function trackButton(buttonName) {
      dataLayer.push({
        event: 'click_button',
        hashed_user_id: getUserId(),
        button_name: buttonName
      });
      alert('Button clicked: ' + buttonName);
    }

    // LINK CLICK EVENT
    function trackLink(linkName) {
      dataLayer.push({
        event: 'click_link',
        hashed_user_id: getUserId(),
        link_name: linkName
      });
    }
  </script>
</head>

<body>

  <!-- GTM noscript -->
  <noscript>
    <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MFT7KX5M"
    height="0" width="0" style="display:none;visibility:hidden"></iframe>
  </noscript>

  <h1>Login Page (Tracking Test)</h1>

  <!-- LOGIN -->
  <input type="email" id="username" placeholder="Enter email">
  <button onclick="login()">Login</button>

  <hr>

  <!-- BUTTON CLICK -->
  <button onclick="trackButton('Click Me Button')">Click Me</button>

  <br><br>

  <!-- LINK CLICK -->
  <a href="https://google.com" onclick="trackLink('Google')">Go to Google</a>

</body>
</html>
