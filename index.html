<!DOCTYPE html>
<html>
<head>
  <title>Test Tracking</title>

  <!-- Google Tag Manager -->
  <script>
    (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id=GTM-MFT7KX5M'+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-MFT7KX5M');
  </script>
  <!-- End Google Tag Manager -->

</head>

<body>

  <!-- Google Tag Manager (noscript) -->
  <noscript>
    <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MFT7KX5M"
    height="0" width="0" style="display:none;visibility:hidden"></iframe>
  </noscript>
  <!-- End Google Tag Manager (noscript) -->

  <h1>Login Page</h1>

  <!-- LOGIN UI -->
  <input type="text" id="username" placeholder="Enter username">
  <br><br>

  <button onclick="login()">
    Login
  </button>

  <hr>

  <h2>Test Section</h2>

  <button onclick="alert('click button')">
    Click Me
  </button>

  <br><br>

  <a href="https://google.com" onclick="trackClick()">
    Go to Google
  </a>

  <!-- SCRIPT -->
  <script>
    window.dataLayer = window.dataLayer || [];

    function login() {
      var username = document.getElementById("username").value;

      if (!username) {
        alert("Please enter username");
        return;
      }

      // save user
      localStorage.setItem("user_id", username);

      // send to GTM dataLayer
      dataLayer.push({
        event: "login",
        user_id: username
      });

      alert("Login success: " + username);
    }

    function trackClick() {
      dataLayer.push({
        event: "click_link",
        link_name: "Google"
      });
    }
  </script>

</body>
</html>
