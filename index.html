<!DOCTYPE html>
<html>
<head>
  <script>
    window.dataLayer = window.dataLayer || [];

    // get user
    function getUserId() {
      return localStorage.getItem("user_id");
    }

    // LOGIN EVENT
    function login() {
      var username = document.getElementById("username").value;

      if (!username) {
        alert("Please enter username");
        return;
      }

      localStorage.setItem("user_id", username);

      dataLayer.push({
        event: "login",
        user_id: username
      });

      alert("Login success: " + username);
    }

    // BUTTON CLICK EVENT
    function trackButton(buttonName) {
      dataLayer.push({
        event: "click_button",
        user_id: getUserId(),
        button_name: buttonName
      });

      alert("Button clicked: " + buttonName);
    }

    // LINK CLICK EVENT
    function trackLink(linkName) {
      dataLayer.push({
        event: "click_link",
        user_id: getUserId(),
        link_name: linkName
      });
    }
  </script>
  <title>Test Tracking GTM</title>

  <!-- Google Tag Manager -->
  <script>

    'https://www.googletagmanager.com/gtm.js?id=GTM-MFT7KX5M'+dl;
    f.parentNode.insertBefore(j,f);

  </script>

</head>

<body>

  <!-- GTM (noscript) -->
  <noscript>
    <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MFT7KX5M"
    height="0" width="0" style="display:none;visibility:hidden"></iframe>
  </noscript>

  <h1>Login Page (Tracking Test)</h1>

  <!-- LOGIN -->
  <input type="text" id="username" placeholder="Enter username">
  <button onclick="login()">Login</button>

  <hr>

  <!-- BUTTON CLICK -->
  <button onclick="trackButton('Click Me Button')">
    Click Me
  </button>

  <br><br>

  <!-- LINK CLICK -->
  <a href="https://google.com" onclick="trackLink('Google')">
    Go to Google
  </a>



</body>
